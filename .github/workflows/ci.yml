name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check .env is not committed
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env file found in repo — remove it and add to .gitignore"
            exit 1
          fi

      - name: Smoke test — server imports cleanly
        run: python -c "import server; print('server imports OK')"

      - name: Run tests
        run: pytest tests/ -v
